syntax = "proto3";

package bridge.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// ServerFacade intercepts HTTP requests matching a hostname and routes them
// to actions based on CEL expressions.
message ServerFacade {
  // Hostname glob pattern this facade intercepts (e.g. "flags.vercel.com",
  // "*.google.com", "**.internal"). Used for routing and TLS cert minting.
  string host = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Ordered list of routes. First match wins.
  repeated ServerFacadeRoute routes = 2 [(buf.validate.field).repeated.min_items = 1];
}

// ServerFacadeRoute pairs a route match with an action to take when matched.
message ServerFacadeRoute {
  // Determines whether this route matches an incoming request.
  ServerFacadeRouteMatch match = 1 [(buf.validate.field).required = true];

  // What to do when matched.
  ServerFacadeAction action = 2 [(buf.validate.field).required = true];
}

// ServerFacadeRouteMatch evaluates incoming HTTP requests.
message ServerFacadeRouteMatch {
  // CEL expression evaluated against a ServerFacadeHttpRequest.
  // Must return a boolean.
  string cel = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}

// ServerFacadeAction defines what response to produce for a matched route.
message ServerFacadeAction {
  // Static HTTP response.
  ServerFacadeHttpResponse http_response = 1 [
    json_name = "http_response",
    (buf.validate.field).required = true
  ];
}

// ServerFacadeHttpResponse is a static HTTP response returned by a facade route.
message ServerFacadeHttpResponse {
  // HTTP status code.
  int32 status = 1 [(buf.validate.field).int32 = {
    gte: 100
    lte: 599
  }];

  // Response body. Marshalled as JSON and sent as the response.
  google.protobuf.Value body = 2;

  // Response headers.
  map<string, string> headers = 3;
}

// ServerFacadeHttpRequest is the request shape available in CEL expressions as `request`.
message ServerFacadeHttpRequest {
  string method = 1;
  string host = 2;
  string path = 3;
  map<string, string> headers = 4;
  map<string, string> query = 5;
  string body = 6;
}
